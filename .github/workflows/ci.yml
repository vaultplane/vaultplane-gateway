name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt, clippy, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          # wasm32-wasip2 builds the reference PII plugin component that the
          # wasm host integration tests load.
          targets: wasm32-wasip2

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace

      - name: Build reference PII plugin (wasm component)
        # Excluded from the workspace (built for wasm, not the host), so build it
        # explicitly. The wasm host tests find the artifact via its in-tree path.
        run: cargo build --release --manifest-path plugins/pii-redaction/Cargo.toml --target wasm32-wasip2

      - name: Test
        run: cargo test --workspace

      - name: Build benchmarks
        # Compile the criterion hot-path benches so they cannot bit-rot. Running
        # them for real numbers is a manual/offline step (CI runners are too
        # noisy for stable measurements).
        run: cargo bench --workspace --no-run

      - name: Latency harness
        # The end-to-end latency harness is #[ignore]d in the normal run; invoke
        # it explicitly. It asserts a generous P99 ceiling, so it catches a gross
        # regression without being flaky on shared runners.
        run: cargo test -p vaultplane --bin vaultplane -- --ignored latency

  coverage:
    name: code coverage (llvm-cov + codecov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
          targets: wasm32-wasip2

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          # Separate key so the coverage build (instrumented) does not
          # collide with the release/debug builds in the other jobs.
          key: coverage

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Build reference PII plugin (wasm component)
        # So the wasm host integration tests run (and are measured) here too.
        run: cargo build --release --manifest-path plugins/pii-redaction/Cargo.toml --target wasm32-wasip2

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          # Codecov needs no token for public repos under their default
          # config; allow the job to succeed if upload fails so a
          # codecov outage does not redden every PR.
          fail_ci_if_error: false

  helm:
    name: helm lint and template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint charts/vaultplane

      - name: Render chart with defaults
        run: helm template release charts/vaultplane > /dev/null

      - name: Render chart with example overrides
        run: |
          helm template release charts/vaultplane \
            --set 'secret.data.OPENAI_API_KEY=sk-test' \
            --set 'secret.data.VAULTPLANE_ADMIN_TOKEN=test-token' \
            --set 'serviceMonitor.enabled=true' \
            --set 'serviceMonitor.bearerTokenSecret.name=release-vaultplane-secrets' \
            --set 'podDisruptionBudget.enabled=true' \
            --set 'env.OTEL_EXPORTER_OTLP_ENDPOINT=http://otel:4318' \
            > /dev/null

      - name: Render chart with external secret
        run: |
          helm template release charts/vaultplane \
            --set 'secret.create=false' \
            --set 'secret.name=existing-secret' \
            > /dev/null

  chart-test:
    name: chart-testing (kind)
    runs-on: ubuntu-latest
    needs: helm
    steps:
      - uses: actions/checkout@v5
        with:
          # chart-testing inspects git history to detect chart changes; the
          # default shallow checkout makes it skip everything.
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gateway image locally
        # We do not pull from GHCR here: kind needs the image in its node's
        # containerd, and pulling private images would require extra auth.
        # Cache is shared with the Docker workflow via type=gha.
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: vaultplane-ci:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: chart-testing

      - name: Load image into kind
        run: kind load docker-image vaultplane-ci:test --name chart-testing

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: ct lint
        run: ct lint --all --chart-dirs charts --validate-maintainers=false

      - name: ct install
        # Install the chart against the kind cluster with the locally-loaded
        # image. helm-extra-set-args overrides values so the install picks up
        # vaultplane-ci:test (pullPolicy=Never to avoid trying GHCR), seeds
        # a fake provider key so the gateway warns but boots cleanly, and
        # gives Deployments a generous wait so QEMU-throttled CI runners
        # have time to come up.
        run: |
          ct install --all --chart-dirs charts \
            --helm-extra-set-args "--set=image.repository=vaultplane-ci --set=image.tag=test --set=image.pullPolicy=Never --set=secret.data.OPENAI_API_KEY=test"
