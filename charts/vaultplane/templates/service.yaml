apiVersion: v1
kind: Service
metadata:
  name: {{ include "vaultplane.fullname" . }}
  labels:
    {{- include "vaultplane.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.proxyPort }}
      targetPort: proxy
      name: proxy
      protocol: TCP
    - port: {{ .Values.service.adminPort }}
      targetPort: admin
      name: admin
      protocol: TCP
  selector:
    {{- include "vaultplane.selectorLabels" . | nindent 4 }}
