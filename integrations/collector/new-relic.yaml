# OpenTelemetry Collector preset: VaultPlane Gateway to New Relic.
#
# New Relic ingests OTLP directly. Use the EU endpoint
# (https://otlp.eu01.nr-data.net) if your account is in the EU region.
#
# Required environment variables:
#   VAULTPLANE_ADMIN_TOKEN   bearer token for scraping the gateway admin port
#   NEW_RELIC_LICENSE_KEY    New Relic ingest license key
#
# Point the gateway at this Collector with:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://<collector-host>:4318

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: vaultplane-gateway
          scrape_interval: 15s
          metrics_path: /admin/metrics
          authorization:
            type: Bearer
            credentials: ${env:VAULTPLANE_ADMIN_TOKEN}
          static_configs:
            - targets: ["vaultplane-gateway:9091"]

processors:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25
  batch: {}

exporters:
  otlphttp/newrelic:
    endpoint: https://otlp.nr-data.net
    headers:
      api-key: ${env:NEW_RELIC_LICENSE_KEY}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/newrelic]
    metrics:
      receivers: [otlp, prometheus]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/newrelic]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlphttp/newrelic]
